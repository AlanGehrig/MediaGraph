# MediaGraph Windows 环境配置

# Neo4j 图数据库配置
neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: password123

# Chroma 向量数据库配置
chroma:
  persist_dir: E:/openclaw/data/MediaGraph/data/chroma

# Redis 任务队列配置
redis:
  host: localhost
  port: 6379

# 媒体文件配置
media:
  # 扫描路径列表
  scan_paths:
    - E:/Photos
    - E:/Videos
    - E:/素材
  
  # 支持的媒体格式
  supported_formats:
    # 图片格式
    - jpg
    - jpeg
    - png
    - webp
    - gif
    - bmp
    - tif
    - tiff
    # RAW格式
    - raf      # Nikon RAW
    - arw      # Sony RAW
    - dng      # Adobe DNG
    - cr2      # Canon RAW
    - nef      # Nikon RAW
    # 视频格式
    - mp4
    - mov
    - avi
    - mkv
    - wmv
    - m4v
  
  # 视频解析采样率 (帧/秒)
  max_video_fps: 1

# API服务配置
api:
  backend_port: 8000
  frontend_port: 3000

# AI模型配置
model:
  # CLIP模型
  clip_model_name: ViT-L/14
  clip_model_path: models/clip
  clip_device: cpu  # cuda 或 cpu
  
  # InsightFace模型
  insightface_model_path: models/insightface
  insightface_device: cpu
  
  # 其他设置
  thumbnail_size: [256, 256]
  max_image_size: 2048
